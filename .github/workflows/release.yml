name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Create dist directory
        run: mkdir -p dist

      - name: Build Linux amd64
        run: GOOS=linux GOARCH=amd64 go build -o dist/secretscalpel-linux-amd64 .

      - name: Build Linux arm64
        run: GOOS=linux GOARCH=arm64 go build -o dist/secretscalpel-linux-arm64 .

      - name: Build Windows amd64
        run: GOOS=windows GOARCH=amd64 go build -o dist/secretscalpel-windows-amd64.exe .

      - name: Build macOS arm64
        run: GOOS=darwin GOARCH=arm64 go build -o dist/secretscalpel-darwin-arm64 .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true